<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1B3A2D;--amber:#C17F24;--parchment:#F5EFE0;--charcoal:#1A1A1A;

html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:#1A1A1A;color:#F5EFE0;overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;}

.card{background:rgba(26,26,26,0.95);border:1px solid rgba(193,127,36,0.15);border-radius:12px;transition:all .3s ease;}

.btn-amber{background:#C17F24;color:#1A1A1A;font-weight:600;padding:10px 22px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;transition:all .2s;}
.btn-amber:hover{background:#d4952e;transform:translateY(-1px);}
.btn-outline{background:transparent;color:#F5EFE0;border:1px solid rgba(245,239,224,0.4);padding:10px 22px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;transition:all .2s;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;}
.badge-green{background:rgba(22,163,74,0.2);color:#4ade80;border:1px solid rgba(22,163,74,0.3);}
.badge-amber{background:rgba(217,119,6,0.2);color:#fbbf24;border:1px solid rgba(217,119,6,0.3);}
.badge-teal{background:rgba(42,122,111,0.2);color:#5eead4;border:1px solid rgba(42,122,111,0.3);}
.badge-gray{background:rgba(100,100,100,0.2);color:#9ca3af;border:1px solid rgba(100,100,100,0.3);}
.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#2A7A6F,#C17F24);border-radius:3px;}
.suspended-overlay{position:absolute;inset:0;background:rgba(26,26,26,0.82);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
input,select,textarea{background:rgba(255,255,255,0.06);border:1px solid rgba(245,239,224,0.15);border-radius:8px;color:#F5EFE0;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:#C17F24;}
select option{background:#1a1a1a;}
.kpi-card{background:rgba(27,58,45,0.5);border:1px solid rgba(193,127,36,0.2);border-radius:10px;padding:18px;text-align:center;}
.toast{position:fixed;bottom:24px;right:24px;background:#1B3A2D;border:1px solid #C17F24;color:#F5EFE0;padding:14px 22px;border-radius:10px;font-size:14px;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.4);animation:slideUp .3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#1a1a1a;border:1px solid rgba(193,127,36,0.3);border-radius:16px;padding:32px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;}
.filter-btn{padding:7px 16px;border-radius:20px;border:1px solid rgba(245,239,224,0.2);background:transparent;color:rgba(245,239,224,0.6);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.filter-btn.active{background:#C17F24;color:#1A1A1A;border-color:#C17F24;font-weight:600;}
.nav-link{color:rgba(245,239,224,0.7);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s;cursor:pointer;}
.nav-link:hover{color:#C17F24;}
.loading-dots span{animation:blink 1.4s infinite;display:inline-block;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#1a1a1a;}
::-webkit-scrollbar-thumb{background:#C17F24;border-radius:3px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 14px;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:rgba(245,239,224,0.4);border-bottom:1px solid rgba(255,255,255,0.08);}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.05);}
tr:hover td{background:rgba(255,255,255,0.02);}
@media(max-width:768px){
  .hide-mobile{display:none!important;}
  .grid-2{grid-template-columns:1fr!important;}
  .grid-4{grid-template-columns:1fr 1fr!important;}
}
</style>
</head>

function useCounter(target,duration,go){
  const [v,setV]=useState(0);
  useEffect(()=>{
    if(!go)return;
    let cur=0;
    const step=target/80;
    const iv=setInterval(()=>{cur+=step;if(cur>=target){setV(target);clearInterval(iv);}else setV(Math.floor(cur));},duration/80);
    return()=>clearInterval(iv);
  },[target,go]);
  return v;
}

function ProjectCard({p,onRequest}){
  const susp=p.status==='suspended';
  return(

      {susp&&(
        <div className="suspended-overlay">

            <div style={{fontFamily:'Cormorant Garamond',fontSize:19,fontWeight:700,color:'#fbbf24',marginBottom:6}}>Not Available</div>
            <div style={{fontSize:12,color:'rgba(245,239,224,0.65)',marginBottom:10}}>Under Verra Review — Consent Dispute</div>
            <div style={{fontSize:11,color:'rgba(245,239,224,0.45)',maxWidth:210,lineHeight:1.6,margin:'0 auto'}}>{p.note}</div>
          </div>
        </div>
      )}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,gap:8}}>
        <div>
          <div style={{fontSize:10,color:'rgba(245,239,224,0.4)',letterSpacing:.4,textTransform:'uppercase',marginBottom:4}}>{p.dev}</div>
          <h3 style={{fontFamily:'Cormorant Garamond',fontSize:'1.1rem',fontWeight:700,lineHeight:1.3,maxWidth:260}}>{p.name}</h3>
        </div>
        <span className={`badge ${susp?'badge-amber':'badge-green'}`} style={{flexShrink:0}}>{susp?'⚠️ Suspended':'✅ Active'}</span>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
        <span className="badge badge-gray" style={{fontSize:10}}>📍 {p.loc.split(',')[0]}</span>
        <span className="badge badge-teal" style={{fontSize:10}}>{p.type}</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        <div style={{background:'rgba(255,255,255,0.03)',borderRadius:6,padding:'9px 11px'}}>
          <div style={{fontSize:10,color:'rgba(245,239,224,0.4)',textTransform:'uppercase'}}>Area</div>
          <div style={{fontSize:13,fontWeight:600,marginTop:2}}>{p.area} ha</div>
        </div>
        <div style={{background:'rgba(255,255,255,0.03)',borderRadius:6,padding:'9px 11px'}}>
          <div style={{fontSize:10,color:'rgba(245,239,224,0.4)',textTransform:'uppercase'}}>Price</div>
          <div style={{fontSize:13,fontWeight:600,color:'#C17F24',marginTop:2}}>{p.price}</div>
        </div>
      </div>
      {p.annual&&<div style={{fontSize:12,color:'rgba(245,239,224,0.55)',marginBottom:10}}>📊 {p.annual}</div>}
      <div style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'rgba(245,239,224,0.5)',marginBottom:5}}>
          <span>Credits Available</span><span>{100-p.sold}% remaining</span>

        <div className="progress-bar"><div className="progress-fill" style={{width:`${100-p.sold}%`}}/></div>

function Projects(){
  const [filter,setFilter]=useState('all');
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({name:'',org:'',email:'',volume:''});

  const filters=[['all','All Projects'],['active','Active'],['review','Under Review'],['redd','REDD+'],['agroforestry','Agroforestry'],['soil','Soil Carbon']];
  const visible=filter==='all'?PROJECTS:PROJECTS.filter(p=>p.tags.includes(filter));
  const submit=()=>{setModal(null);setForm({name:'',org:'',email:'',volume:''});setToast(true);setTimeout(()=>setToast(false),4000);};
  return(
    <section id="projects" style={{padding:'80px 24px',background:'#1A1A1A'}}>
      <div style={{maxWidth:1280,margin:'0 auto'}}>
        <div className="badge badge-teal" style={{marginBottom:12}}>Live Marketplace</div>
        <h2 style={{fontFamily:'Cormorant Garamond',fontSize:'clamp(1.8rem,3.5vw,2.8rem)',fontWeight:600,marginBottom:10}}>Live Project Listings</h2>
        <p style={{color:'rgba(245,239,224,0.55)',fontSize:14,marginBottom:6,maxWidth:640,lineHeight:1.7}}>Verified community carbon projects with full provenance data.</p>
        <p style={{fontSize:11,color:'rgba(245,239,224,0.3)',fontStyle:'italic',marginBottom:28,maxWidth:680,lineHeight:1.6}}>Projects listed are referenced from public Verra registry data for market intelligence purposes. LCLI has no affiliation with project developers unless explicitly stated. Credit availability subject to direct developer agreement.</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:32}}>
          {filters.map(([k,l])=><button key={k} className={`filter-btn${filter===k?' active':''}`} onClick={()=>setFilter(k)}>{l}</button>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:20}}>
          {visible.map(p=><ProjectCard key={p.id} p={p} onRequest={setModal}/>)}
        </div>
      </div>
      {modal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
              <h3 style={{fontFamily:'Cormorant Garamond',fontSize:'1.4rem'}}>Request Credits</h3>
              <button onClick={()=>setModal(null)} style={{background:'none',border:'none',color:'rgba(245,239,224,0.5)',cursor:'pointer',fontSize:20}}>✕</button>
            </div>
            <div style={{background:'rgba(27,58,45,0.4)',borderRadius:8,padding:12,marginBottom:18,fontSize:13,color:'rgba(245,239,224,0.7)'}}>
              <strong style={{color:'#C17F24'}}>{modal.name}</strong><br/>{modal.price} · {modal.type}
            </div>
            {[['Your Name','name','text'],['Organization','org','text'],['Email','email','email'],['Volume Needed (tonnes)','volume','number']].map(([l,k,t])=>(
              <div key={k} style={{marginBottom:13}}>
                <label style={{fontSize:11,color:'rgba(245,239,224,0.45)',display:'block',marginBottom:5}}>{l}</label>
                <input type={t} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} placeholder={l}/>
              </div>
            ))}
            <button className="btn-amber" style={{width:'100%',marginTop:6}} onClick={submit}>Submit Credit Request</button>
          </div>
        </div>
      )}
      {toast&&<div className="toast">✅ Request submitted! LCLI team will respond within 24 hours.</div>}
    </section>
  );
}

function Estimator(){
  const [form,setForm]=useState({ha:'',land:'Savanna Grassland',use:'Open Grazing',years:20,town:'Laisamis, Marsabit County',consent:'Full FPIC documented'});
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const score={'Full FPIC documented':95,'In progress':55,'Not started':20};
  const run=async()=>{
    if(!form.ha){setErr('Please enter your land size in hectares.');return;}
    setErr(null);setLoading(true);setResult(null);
    const msg=`Land: ${form.ha} hectares of ${form.land}. Current use: ${form.use}. Duration: ${form.years} years. Nearest town: ${form.town}. Consent status: ${form.consent}.`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:`You are an expert carbon credit analyst specialising in Kenya and East African drylands. Real project benchmarks: NKRCP (1.9M ha grassland, VM0026, ~$9/t, 50Mt lifetime); Kasigau REDD+ (200,000 ha dryland forest, ~1.4Mt/yr, $14-18/t); Acorn Agroforestry (ex-post CRUs, €20-31/t, satellite verified); KACP SALM (22,000 ha, VM0017, 1.2Mt lifetime). Kenya avg VCM price $9.77/tonne; high-integrity community projects reach $18/t. FPIC is now legally required and premium-priced. Provide: (1) Estimated annual tCO₂e with methodology reasoning, (2) Total lifetime credits, (3) Revenue range USD low/high, (4) Best-fit standard and methodology code, (5) Integrity premium based on consent, (6) Time to first issuance, (7) Key risks. Be specific. Use ## for section headers.`,
          messages:[{role:'user',content:msg}],
        }),
      });
      const d=await res.json();
      if(d.content&&d.content[0])setResult(d.content[0].text);
      else setErr('No response received. Please try again.');
    }catch(e){setErr('Connection error: '+e.message);}
    setLoading(false);
  };
  return(
    <section id="estimator" style={{padding:'80px 24px',background:'linear-gradient(180deg,#1A1A1A 0%,rgba(27,58,45,0.25) 100%)'}}>
      <div style={{maxWidth:1280,margin:'0 auto'}}>
        <div className="badge badge-amber" style={{marginBottom:12}}>AI-Powered</div>
        <h2 style={{fontFamily:'Cormorant Garamond',fontSize:'clamp(1.8rem,3.5vw,2.8rem)',fontWeight:600,marginBottom:10}}>Estimate Your Land's Carbon Potential</h2>
        <p style={{color:'rgba(245,239,224,0.55)',fontSize:14,marginBottom:36,maxWidth:600,lineHeight:1.7}}>Powered by AI trained on Kenya-specific carbon methodologies including VM0026 (grassland), VM0017 (SALM), and REDD+ baselines.</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:28}} className="grid-2">
          <div className="card" style={{padding:28}}>
            <h3 style={{fontFamily:'Cormorant Garamond',fontSize:'1.25rem',marginBottom:20}}>Land Parameters</h3>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:'rgba(245,239,224,0.45)',display:'block',marginBottom:6}}>Land Size (hectares) *</label>
              <input type="number" value={form.ha} onChange={e=>set('ha',e.target.value)} placeholder="e.g. 5000"/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:'rgba(245,239,224,0.45)',display:'block',marginBottom:6}}>Land Type</label>
              <select value={form.land} onChange={e=>set('land',e.target.value)}>
                {['Savanna Grassland','Dryland Acacia Forest','Agroforestry Farm','Wetland-Riparian','Mixed Rangeland'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:'rgba(245,239,224,0.45)',display:'block',marginBottom:6}}>Current Land Use</label>
              <select value={form.use} onChange={e=>set('use',e.target.value)}>
                {['Open Grazing','Degraded','Community Conservancy','Smallholder Farm','Protected Area'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:'rgba(245,239,224,0.45)',display:'block',marginBottom:6}}>Project Duration: <strong style={{color:'#C17F24'}}>{form.years} years</strong></label>
              <input type="range" min={10} max={30} value={form.years} onChange={e=>set('years',+e.target.value)} style={{width:'100%',accentColor:'#C17F24'}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'rgba(245,239,224,0.3)',marginTop:3}}><span>10 yrs</span><span>30 yrs</span></div>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:'rgba(245,239,224,0.45)',display:'block',marginBottom:6}}>Nearest Town</label>
              <input type="text" value={form.town} onChange={e=>set('town',e.target.value)}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:11,color:'rgba(245,239,224,0.45)',display:'block',marginBottom:10}}>Community Consent Status (FPIC)</label>
              {['Full FPIC documented','In progress','Not started'].map(o=>(
                <label key={o} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,cursor:'pointer'}}>
                  <input type="radio" name="consent" checked={form.consent===o} onChange={()=>set('consent',o)} style={{accentColor:'#C17F24'}}/>
                  <span style={{fontSize:13,color:form.consent===o?'#F5EFE0':'rgba(245,239,224,0.5)'}}>{o}</span>
                </label>
              ))}
              <div style={{marginTop:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:5}}>
                  <span style={{color:'rgba(245,239,224,0.45)'}}>Integrity Score</span>
                  <span style={{color:'#C17F24',fontWeight:600}}>{score[form.consent]}%</span>
                </div>
                <div className="progress-bar"><div className="progress-fill" style={{width:`${score[form.consent]}%`}}/></div>
              </div>
            </div>
            {err&&<div style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:6,padding:'10px 14px',fontSize:13,color:'#f87171',marginBottom:12}}>{err}</div>}
            <button className="btn-amber" style={{width:'100%',padding:'13px',fontSize:15}} onClick={run} disabled={loading}>
              {loading?<span>Analysing<span className="loading-dots"><span>.</span><span>.</span><span>.</span></span></span>:'⚡ Estimate with AI'}
            </button>
          </div>
          <div>
            {!result&&!loading&&(
              <div style={{height:'100%',minHeight:300,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',textAlign:'center',border:'2px dashed rgba(193,127,36,0.2)',borderRadius:12,padding:40}}>
                <div style={{fontSize:52,marginBottom:16}}>🌿</div>
                <h3 style={{fontFamily:'Cormorant Garamond',fontSize:'1.4rem',color:'rgba(245,239,224,0.45)',marginBottom:8}}>Your estimate will appear here</h3>
                <p style={{fontSize:13,color:'rgba(245,239,224,0.3)',lineHeight:1.7}}>Enter your land parameters and click "Estimate with AI" to receive a detailed carbon credit projection based on Kenya market benchmarks.</p>
              </div>
            )}
            {loading&&(
              <div style={{height:350,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',border:'1px solid rgba(193,127,36,0.15)',borderRadius:12}}>
                <div style={{width:46,height:46,border:'3px solid rgba(193,127,36,0.2)',borderTop:'3px solid #C17F24',borderRadius:'50%',animation:'spin 1s linear infinite',marginBottom:18}}/>
                <p style={{fontSize:14,color:'rgba(245,239,224,0.55)'}}>Analysing with Kenya carbon benchmarks...</p>
              </div>
            )}
            {result&&(
              <div>
                <div style={{background:'linear-gradient(135deg,rgba(42,122,111,0.15),rgba(193,127,36,0.1))',border:'1px solid rgba(193,127,36,0.25)',borderRadius:10,padding:16,marginBottom:14}}>
                  <div style={{fontSize:11,color:'#C17F24',fontWeight:600,letterSpacing:.4,textTransform:'uppercase',marginBottom:3}}>AI Carbon Assessment</div>
                  <div style={{fontSize:11,color:'rgba(245,239,224,0.4)'}}>Based on Kenya VCM benchmarks & project comparables</div>
                </div>
                <div style={{background:'rgba(27,58,45,0.3)',border:'1px solid rgba(42,122,111,0.25)',borderRadius:10,padding:20,fontSize:13,lineHeight:1.85,color:'rgba(245,239,224,0.88)',maxHeight:480,overflowY:'auto'}}>
                  {result.split('\n').map((line,i)=>{
                    if(line.startsWith('##'))return<div key={i} style={{fontFamily:'Cormorant Garamond',color:'#C17F24',fontSize:'1.05rem',marginTop:14,marginBottom:3,fontWeight:700}}>{line.replace(/##\s*/,'')}</div>;
                    if(line.startsWith('**')&&line.endsWith('**'))return<div key={i} style={{fontWeight:600,color:'#F5EFE0',marginTop:5}}>{line.replace(/\*\*/g,'')}</div>;
                    return<div key={i} style={{marginBottom:line===''?8:0}}>{line}</div>;
                  })}
                </div>
                <div style={{display:'flex',gap:10,marginTop:14}}>
                  <button className="btn-amber" style={{flex:1}} onClick={()=>document.getElementById('contact')?.scrollIntoView({behavior:'smooth'})}>Talk to LCLI Team</button>
                  <button className="btn-outline" style={{flex:1}} onClick={()=>navigator.clipboard?.writeText(result)}>Copy Estimate</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}
